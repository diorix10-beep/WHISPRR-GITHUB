<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4736E"/>
      <stop offset="100%" style="stop-color:#C88B84"/>
    </linearGradient>
    <linearGradient id="wave" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.6"/>
    </linearGradient>
  </defs>
  <rect width="100" height="100" rx="22" fill="url(#bg)"/>
  <!-- Speech bubble shape -->
  <path d="M20 38 C20 28, 28 22, 50 22 C72 22, 80 28, 80 38 C80 48, 72 54, 50 54 C44 54, 38 53.5, 34 53 L26 60 L28 52 C23 50, 20 45, 20 38Z" fill="white" fill-opacity="0.2"/>
  <!-- Sound wave arcs (whisper) -->
  <path d="M38 36 C40 32, 44 30, 48 32" stroke="url(#wave)" stroke-width="3" stroke-linecap="round" fill="none"/>
  <path d="M38 42 C42 38, 48 36, 54 38" stroke="url(#wave)" stroke-width="3" stroke-linecap="round" fill="none"/>
  <path d="M38 48 C44 44, 52 42, 60 44" stroke="url(#wave)" stroke-width="3" stroke-linecap="round" fill="none"/>
  <!-- Dot accent -->
  <circle cx="34" cy="36" r="3" fill="white" fill-opacity="0.85"/>
  <!-- Bottom text -->
  <text x="50" y="80" font-family="Georgia,serif" font-size="14" font-weight="bold" fill="white" fill-opacity="0.95" text-anchor="middle" letter-spacing="2">WHISPRR</text>
</svg>
